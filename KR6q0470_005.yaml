body:
  text: 嗣法門人法雲廣學同編聯芳偈欣然維那汾陽放出小獅兒牙爪猙獰意氣殊他日等閒輕露出一聲哮吼震寰區隱素副寺江南江北復汾陽鐵骨稜稜肖石霜坐斷瞎驢正法眼西河異目播諸方本覺知客大溈山喫棒痕多轉入汾陽獅子窩養就爪牙莫輕露待時騰踏震山河徹空知客本色道人堅守操從教千聖不能移等閒未肯輕拋露露出人天眼便迷德一維那枯樹花開劫外春靈根遠植自威音精勤母惜深培養果熟香飄自有辰蘊璞副寺一番煆煉一番新不變紅爐始見真爍破人天生鐵面從教佛祖亦難親鼎新知客參得乾明本分禪生機一路始超然娘生鼻孔全無用濟北家風格外傳雲輝後堂一番相見一番親辣掌獰拳不讓仁拈得威音前一著翻時為雨覆為雲越塵副寺法戰當場獨許君機前一句主賓分楊岐三腳驢堪肖弄出人天喪膽魂一如知藏大冶紅爐爍面門銅頭鐵額盡消魂鍊成一柄金剛劍豎抹橫揮海嶽昏相空副寺聲前一句露全提返擲還他獅子兒掀倒法幢粗手腳將來為我好維持悟圓侍者雲門糊餅趙州茶覿面拈來驗作家不負大悲機契合從教寰海布曇花本淨監院靈根本具不須栽遇澤萌芽頓發來異日必當成大樹大悲山上起雲雷本清監院因地本無法無法因地生果熟香飄日縱橫任汝行西琳菴主機契孤峰錐劄句通身活潑絶依俙大悲拄杖親分付待聚風雲好指迷勝光監院廣勝參隨十五年今朝始慶得安然大悲院裏親分付珍重闍黎莫妄傳立菴維那返擲驚群獅子兒爪牙迅捷利如錐藏身且向深林裏騰踏風雲自有時月菴知客坐斷堯都第一峰目前誰得可相同臨機別有超方眼殺活縱橫疾似風與二酉宋大苑馬龜毛白拂當陽舉三世明明鼻孔同分付維摩休擬議狸奴白牯展家風鑑初劉居士不忘獅子機前句奮迅參窮佛祖關龐老風光今復見臨機未許妄追攀我成張居士當年請益娘生話枯木花開劫外春鬧市叢中全體露拈來物物總非塵妙空尼十年為法忘身究機契娘生徹淨瓶堪囑木山妙總句將來任運指群靈達磨初祖像讚婆心片片往東來不遇其人可嘆哉少室峰前家計泄一花五葉至今開西來這老禿口甜心甚毒其意大不然惑亂人成佛者樣臭騷胡描他作甚麼咄者個老胡心不歇西來東土惑人心肝腸一片難描畫半是思君半恨君愁眉蹙額氣昂藏話不投機便渡江熊耳山前尤敗露兒孫殃及遍芬芳自贊雲輝後堂請手持白拂指東畫西一條拄杖殺活無疑魔佛到來未免皺眉喝一喝云知音只有後堂雲闍黎本如監院請真本無形假名妄立真妄皆除青天白日有時風恬浪靜有時雷轟電掣行臨濟之正令展天童之棒喝江南直造堯都廣勝紅爐初熱次闡西河踞地復開乾明規則一味實頭到底聖凡諸病剿絶只這村僧模樣為渠一並拈出咄寶峰維那請這漢無面目聖凡情勦絶慣會喝佛罵祖善能敲風棒月常將斷貫龜毛繩穿卻撩天鼻孔客唯有朴厚峰維那數載親遭熟棒喝爾今描畫須識渠知恩香爇庭前柏薰他面孔黑如漆遺與千年後兒孫知是大悲白拈賊了一法孫請吾真本無形四大若空塵吾孫既描畫空裏卻生紋切須自了徹一物亦不存始見祖禰不了方知殃及兒孫月菴知客請這尊和尚心空眼曠慣結佛祖冤好起人天謗海底蓬塵生陸地波萬丈如此無賴村僧如何月菴知客卻能六載親依榜樣勝光監院請者箇憨叟和尚生緣巴子國中法受龍淵岸上三晉六建法幢勝光監院數鉗椎棒下知恩須的當收向文殊閣角中千古兒孫作榜樣本淨監院請監院寫吾真乞題卻是假真假俱不著端的作麼耶鼻孔撩天絶覆藏本淨摩娑伴邊雅一如西堂請者箇阿師性情古怪聖凡兩忘佛祖冤害棒頭殺活最難親唯一西堂識痛快知恩不負惡鉗鎚人天眼目須堪載相空副寺請是相何狀秋空寥曠不是相空孰能近傍桂輪孤朗碧天高祖印重光無有上祖燈侍者請者箇老漢情性無拘有時暴怒如疾雷有時慈照似秋月致令熱喝冷棒惡罵粗拳未免婆心特地還會麼徹底家私傾漏泄祖燈豁達始知恩徹空副寺請這等村僧無狀可憑異凡異聖非古非今人天不著地獄何存參遍海內攪亂叢林名善知識惡燥無情喝佛罵祖以當知恩徹空副寺深受錐針而今描畫成何事莫把沉檀沒鼻薰立庵侍者請如是村僧無可諭說慈悲一無暴怒千斛世法佛法都盧屏卻但噇村飯任意輕忽打人唯恐不痛罵人只恐不毒不是立菴侍者十載如何湊泊咦水入水兮冤報冤殃及兒孫無有歇越塵維那請這個阿師人難識渠古頭怪腦異世名模非聖非凡非佛非祖有時性燥如阿修羅王有時慈悲若菩薩無比動靜了然莫測施為渾無倚依但有的骨越維那相共清風明月裏雲輝後堂小影這漢尋行精梵行諸緣不著只修持一衣一鉢無餘事或坐或行佛共依七九相逢向上旬耋年端的布車時闍黎末後須珍重鐵樹花開劫外基靈巖洪川主人像讚諱澄浩澄清絶點浩瀚洪深川流百納德洽叢林衆稱曰佛性秉天真瞻之仰之無不欽尊且是誰歟靈巖主人德玄禪人像讚形本無形相非有像虛空寥廓乾坤浩蕩咄水在長江月在天白雲來往青山上太一禪人像讚非凡非聖非俗非僧相本無相形本無形既然如是唯此可真留與兒孫堪供養它年久任播佳名詩偈過太行有感太行山勢險策杖上雲霄極目天齊遠回頭日並高寒猿啼古木幽鳥擇新巢轉憶恩深處關河豈憚勞再遊霍山廣勝寺值雪賦感白石磷磷一徑幽孤笻乘興復來遊青山不厭雲開合緑水何妨月去留此日風光猶可羡昔年景象孰堪酬六花片片盈空舞印破芒鞋過別州山中久雨山舍連旬雨彌封一徑苔柴門無客到竹榻有雲來鳥語千峰翠風鳴萬壑哀禦寒先整衲撩亂取荷裁次菊潭胡閣下韻鳳闕承金御龍樓接玉音惠風噓庶物德澤沛泉林絃頌歌樵牧仁慈及獸禽股肱欣有道良政合天心贈盛京弘福一融和尚大法遙聞帝里弘曉鐘長夜醒迷聾龍淵一派源流遠蜀嶺家聲根本同麈尾拂開三要印杖頭截斷五宗風人天正眼明如日法雨氛霏萬類蒙示隱素副寺之江南二首奮志真參悟處深超群端的羡英靈翻身直作獅兒吼莫學他山野干鳴辛勤侍我太行過為法勞形古不多三喚室中明有據知恩莫負老頭陀示徹空知客忘身為法不辭勞此去江南路轉遙捉敗清風歸報我起家定許是英豪禮首山念祖塔巍巍卓豎首山巔萬仞嵩峰列案前汝水東來流漢月牛山西出掛中天燈分沙界明無盡道播乾坤豈有邊不肖遠孫親禮覲深慚無物表心焉次江右震宇楊刺史萬里秋空鴈影寒孤光一段劫前看兩門柱石多生願百世宗壇四海歡不二堂中逄未晚無雙月下見非難相將補袞調羹手願作靈山正法垣寧寰座主舍利塔下開講法華以偈贈之雷音遠震辨如鋒舌吐蓮花法喻弘開括五時玄義旨會歸百界妙心宗靈山一會何會隔沙界三根普潤同多寶凌空從地湧證明法化贊流通寄酬四明雲峰雪廠和尚相違彈指幾更春每憶弘慈豁素塵縹渺雲蹤徒可羡嬋娟月色望來頻象王未睹回身步獅子遙聞踞地嚬無奈業風吹到此雙眉時結苦思仁懷滄起朱太史姑射峰頭雲散彩一輪明月照汾陽恆懷妙論朱夫子異日西河共舉揚示廣道田居士誠心參叩已多年力竭情窮一句玄針鉢機投明掌下白花新綻火中蓮示廣寧馬居士滾滾波濤息不難死生一著好生看臨機薦得棒頭旨說甚油麻樹上攤示耐心禪人忍耐世間為第一安心隨處得便宜個中識得安心法春去秋來總不移訪雲石張孝廉策杖行來日欲曛山家無可贈于君幽然此道吾無隱檻外清波泛白雲雪梅傲骨冰肌類莫同暗香浮動雪花中群芳未放君先放肯逐江南桃李紅示明吾劉居士明明向道吾無隱智者如何轉更疑若有一毫頭不露老僧情願入泥犁壽維綱申居士遙望南山騰瑞彩瑤池仙客集君家懸弧卻值生申日壽苑常開不謝花示法華禪德開權顯實示當家舌底常開優鉢花衣裏有珠如薦得不須門外覓三車示實行禪人真實功能全行證當陽一句莫遲疑電光影裏翻身轉始到心空及第時示離言禪人離卻語言識自心漫于紙上苦追尋微塵剖出大千卷剎剎塵塵說不停示成吾徐居士禮五臺君來話別禮清涼山自高兮水自長遇著文殊休放過乾明歸要五名香寄懷長安爾璽于邑侯每憶堯都邂逅時連床風雨話雞啼長安一片清宵月無限清光到竹扉示見真禪師廣勝初參見乾明見若何若能真見見方識果無多苟不如斯會空將歲月磨玄關如透脫免被淨明呵示佛乘侍者傾心為法捨塵緣一念精參徹道源直下悟來無可得超然高出佛乘先雨霽登高雨過青山翠欲流登高逸興樂優悠峰頭縱目青天外不覺閒身步斗牛辭院歸山院辭村落隱山林緇素盈衢遠送程一片白雲如款曲幾多幽鳥似逢迎非因厭鬧妄求靜為欲舒懷恰野情去住了忘于彼此盈眸聲色總天真偕衆入姑射拽杖披雲入翠峨參隨龍象踏煙蘿高低瑞色浮青巘遐邇祥雲結綺羅太白分燈輝濟北汾陽獅子吼西河法幢仙窟從今豎正脈流通萬億多次元夫王文學玩月韻山河遍現總心光視聽分明不覆藏一段孤光如可掬吾無隱爾體全彰龍文王貢士入山修供結茅虔禮大悲王普為群靈禱吉祥不是靈山當記莂遠臨泉石共敷揚紛飛花雨盈山谷繚繞香雲結道場儒佛宗風原不二維摩一默體全彰除夕示衆轉眼年華一歲除蹉跎不覺五旬餘應緣無力心如水養道常思草結廬恆愧住持功行薄每慚荷衆福緣疏安平退隱隨時過珍重諸禪為法居示大醒法孫歸弼河陽覺長老法門種草貴真誠心不吾欺佛祖昆珍重輔揚正法眼兒孫他日滿乾坤贈道源座主弼化道德淵源三際同法門標表羡高風輔揚妙化人天仰指出昏衢正眼通早粥示衆白粥黃虀山舍便漫嗟淡薄坐空筵箸頭碗底青天現粒米檀心非等閒示福宇知客歸空王山參罷乾明復故山清風明月杖頭擔到家相見空王老莫把拳頭肋下還示佛然侍者巾瓶侍我十年餘擇火焚香日不虛吹起布毛舊公案莫教容易放過渠示佛如侍者古人學道豈尋常繼晷焚膏刻不忘即佛即心心即佛如如不動體全彰齊榜引清泉爛煮接方來賢聖同堂笑滿腮幸有維摩伸隻手鉢盂開口歎奇哉執事榜引法幢須藉大家扶四海同歸在此居一等風雲看變化百千三昧顯無餘
