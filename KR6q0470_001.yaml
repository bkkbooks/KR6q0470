body:
  text: 嗣法門人法雲廣學等編住山西古堯霍山廣勝禪寺順治丁酉孟春既望就本寺受洪洞縣大苑馬炳奎宋護法及本寺耆宿請主院事上堂吹毛利刃露堂堂覿體分明遍界彰風送百花香滿院塵塵總是法中王以拂子打相云還會麼若也於斯會得三世諸佛舉首無門歷代祖師退身有分更説甚麼菩提涅槃真如解脫擊禪床云一時百雜碎了也山僧恁麼告報大似尖上加尖潑油救火若論個事好不資一毫醜不資一毫於此於彼初無間然自他不隔毫端始終不離當念未舉先知一踏鴻門兩扇開其或未然啼得血流無用處不如緘口過殘春拈拄杖下座結制上堂問上無攀仰下絶己躬正恁麼時如何師震威一喝進云朔風吹鐵面當體骨毛寒師揚眉示之進云一種沒絃琴惟師彈得妙師云罕逢穿耳客乃云天寒人寒大家在者裏滴水滴凍一點不曾瞞正恁麼時還假結制開爐得麼若向者裏委悉得去説甚十方世界為我伽藍盡未來際作一期限直得天不能蓋地不能載淨顆顆赤灑灑全無巴鼻迥絶安排其或未然莫怪山僧壓良為賤以拄杖一齊按下衆舉首師云鐵蛇橫古路一馬生三寅參師誕衆請上堂問寶塔光騰呈瑞彩無生面目已全彰師今上堂為衆如何指示師云千差齊坐斷萬法總無為進云雖然官不容針還許私通車馬也無師云下坡不走快便難逢僧禮拜乃云月桂香飄祖師鼻孔獨露秋光彩散古佛面目宛然是處是慈氏無門無善財然燈古佛是日誕山僧母難遇今朝若道今朝是生日虛空鐵馬躍天階今朝若謂不是生日海底泥牛銜月走生與不生即且止古佛與露柱交參阿誰證據驀拈拄杖云出頭天外看誰是我般人卓拄杖下座燈節結蓮社請上堂驀拈拄杖打相云還見麼然燈如來向山僧拄杖頭上放大寶光光中化佛各各演説無量陀羅尼門攝受人天共入唯心淨土現前一會人人覿面彌陀個個親蒙受記且道還有共相證據者麼有則出來露個消息如無山僧不免向第二義開方便門令汝諸人七通八達去也拈拄杖卓一卓便下座上堂大道寥廓人天杳絶端倪至理沖融凡聖了忘彼此一切處全彰無法不周遍塵剎獨露施為普應伶俐衲僧向者裏一直坐斷便能隨處作主遇緣即宗應物現形隨機展演秪如趙州道木佛不度火金佛不度爐泥佛不度水總不問汝諸人且道畢竟如何是真佛聻良久云切忌頭上安頭下座元旦上堂問昨朝舊歲今朝新年不涉新舊一句請師直指師云木雞啼子夜芻犬吠天明進云一天新雨露萬物戴陽春師云和光合彩乃云元正啓祚萬象咸新頭頭顯露法王物物齊彰至化所以道天得一以清地得一以寧君王得一坐致太平臣宰得一掌握權衡士農得一歌鼓而耕且道衲僧得一合作麼生乃起身鞠躬云古佛殿前咸稽首萬年仰祝聖明君圓藏上堂佛日騰輝匝地普天光晃耀法雲靉靆微塵剎土總清涼頭頭顯不夜之珠物物彰威音之旨驀拈拄杖召衆云還會麼三世諸佛向拄杖頭上放大寶光洞徹三千大千世界一切情與無情於中隨機演化教設多方大小偏圓總歸法藏然則于衲僧分上猶未得在且道不涉頓漸一句又作麼生復卓拄杖下座解制兼退院上堂僧問今朝解制即不問自恣一句意如何師云一點水墨到處成龍進云處處緑楊堪繫馬家家有路透長安師云腳跟下作麼生僧豎一指師云羅公照鏡乃云結卻布袋九旬終今日解開八面通個個通身俱手眼拿雲攫霧把清風諸禪客好奇逢白雲飛散露晴空腳底芒鞋獰似虎肩頭拄杖活如龍今日暫辭霍山去且隨雲水話從容野鶴孤雲為伴侶生涯盡在鉢盂中敢問大衆鉢盂中事即且止解制一句作麼生以杖架肩云楖栗橫肩不顧人直入千峰萬峰去下座住山西汾州府汾陽縣獅子禪院據室云獅子窟中獅子栴檀林裏栴檀顧左右云且道者是甚麼所在喝一喝云龍象蹴踏非驢所堪上堂拈香祝聖畢次拈香云此一瓣香栽培有素陶汰無方龍淵隊裏一旦得來獅子院中二回拈出供養見住嘉興府三塔龍淵堂上傳臨濟正宗三十二世自間覺老和尚用酬法乳之恩斂衣就座上首白椎見師云第一義且置獅子院中獅子兒試出來騰踏看問鐵牛之機則且止獅子出窟時如何師云驚天動地進云獅子遊行時又作麼生師云海震山搖進云獅子瞌睡時如何師云百獸潛蹤僧禮拜師乃云昨夜金風急今朝杲日輝霜花開遍野萬象悉舒眉綿山增瑞彩汾水涌朝歸西河獅子吼大地露全威驀喝一喝云還有不顧性命者麼乃顧左右云出群須是英靈漢敵勝還他獅子兒復喝一喝舉昭祖無業禪師示衆云汾陽有西河獅子當門踞坐若有來者即便咬殺有何方便進得汾陽門見得汾陽人若見汾陽人堪與佛祖為師師云昭祖恁麼道未免惡口小家今日新汾陽卻又不然汾陽獅子河西也不當門踞坐來者亦不咬殺但秪哮吼一聲管教聞者盡皆喪命雖然如是且道今日獅子與昔日獅子是同是別喝一喝下座開爐上堂虛空為爐須彌作炭是聖是凡一爐烹煆火星迸散四部洲烈焰飛騰三大劫銅頭鐵額盡銷鎔馬面驢頭俱粉碎是汝諸人到者裏作麼生轉身吐氣若轉得身吐得氣如龍得水似虎靠山人人作略通方個個眼親手辨苟或未然擸下拄杖云急須顧眉毛上堂佛法二字不在別處秪在諸人眉毛睫上無時不輝天鑑地耀古騰今若是伶俐漢直下信得及一肩領荷將去自然二六時中孤迥迥峭巍巍通身慶快徹體風流佛祖管他不著寒暑遷他不得正恁麼時還有恁麼人麼良久云碗脫丘除夕上堂問松柏長青即且止年窮一句事如何師云汾州寒至極虧殺有煤燒乃云看看一年又到頭諸人腳跟下事還搆得也未如搆未得直須向者裏猛著精彩錐劄將去忽然爆落燈花豈不一場好笑所以道窮則變變則通有時拈頭作尾也得有時拈尾作頭也得任運卷舒隨時瀟灑若也未然卓拄杖云來年更有新條在惱亂春風卒未休菊潭胡太師送供請上堂問千里同風不二門維摩一默古今聞個中消息請師露大地同霑格外春師云天上有星皆拱北人間無水不朝東進云一句迥超千聖外松蘿不與月輪齊師云好音到耳人皆聳一句無私耀古今乃云門庭不二千里同風格外玄機知音罕遇到者裏須是過量人方能共揚第一義所以大人具大見大智得大用舉一機而千機頓赴提一目而萬目齊彰佛法世法了無向背人間天上一念普周今日乃胡太師運不思議威神移上方香積遠布汾陽飯學般若禪流光揚祖席讚化玄風且道因齋慶讚一句作麼生道全憑補袞調羹手撥轉如來正法輪復舉陸亙大夫問南泉云肇法師也奇怪解道天地與我同根萬物與我一體泉指庭前牡丹花召大夫云時人見此一株花如夢相似師云一人言中有響一人句裏藏鋒雖則兩兩作家要且公案未圓今日若有問汾陽天地與我同根萬物與我一體但向道一翳在眼空花亂墜且道與古人是同是別良久舉拂云知音自有知音知何必清風動天地解制上堂問西來大意即不問今朝解制意如何師云南山起雲北山下雨進云恁麼則撒手逍遙去也師云一任𨁝跳乃云九旬結制罷今日放出獅兒意氣豪捉敗東風春爛熳吒沙威武善能哮人人頂門具眼個個腳下通津覷破佛祖玄關踏斷曹溪正路把住則大地失彩放行則日月重輝即今還是把住耶放行耶拈拄杖云龍得水時增意氣虎逢山勢長威獰卓一卓下座上堂問如何是獅子境師云四面青山常聳翠進云如何境中人師云端然氣宇獨為尊僧禮拜乃云住持事繁忙無法可商量動容揚古路萬慮悉皆忘拄杖子傍觀不覺失笑云汾陽終日口吧吧説佛説法談妙談玄到者裏何得言窮伎盡取笑傍觀山僧向道相識滿天下知心有幾人驀擲拄杖云大衆分明記取他日莫受人瞞隱副寺拈起拄杖云和尚拄杖因甚在某甲手中師云也要殃及上座進云拈來用出人天仰不動干戈見太平師云衆眼難瞞元宵解制上堂若論第一義諦明明迥絶承當歷歷當陽不諱光輝溢目烜赫人天各各圓明朗耀如帝網之珠重重交互毫無間隔若能一念回光直下頓開心地所以一句通千句萬句一時通一機透千機萬機一時透自然頭頭上了物物上圓視聽分明了無欠剩始可橫擔楖栗獨步大方然則山僧恁麼告報猶是撒土撒沙塗污諸人了也且道臨行一句如何分付自是不歸歸便得五湖煙景有誰爭卓拄杖下座千葉寶蓮彌陀大佛開光上堂問寶蓮千葉湧金輪示現端嚴妙相身向上宗乘即不問請師一句利群盲師云有水皆含月無山不帶雲進云恁麼則剎剎盡成清淨國塵塵全露法王身師云風行草偃僧禮拜師噓一噓乃云化育之本物我同途生佛之源聖凡不二靈然獨耀透聲色無遺體用全彰應剎塵不露所以道佛真法身由若虛空應物現形如水中月即今人天普集且如何説個應現的道理驀豎拄杖云大衆還知麼無量壽如來向山僧拄杖頭上現最勝身坐寶蓮花放大寶光照徹塵沙國土直得山河大地盡作琴聲水鳥樹林咸宣妙法衆中還有共相證據者麼便下座住山西汾州府太子禪院據室汾陽祖席海內皆名不肖兒孫到者裏如何施設喝一喝云正令無回互人天喪膽魂便據座上堂拈香祝聖畢又拈云天無私蓋地無私載直向威音那畔信手拈來供養開山傳臨濟正宗第六世上善下昭遠祖大和尚伏願燈分三界道震大千末拈云此瓣香毒氣深入惡習難忘次第三回拈出供養芙蓉堂上傳汾陽第二十五世自間老和尚用酬法乳遂攝衣就座揮拂子云舊鋪新開和盤托出還有知音者麼出衆相見看問八百餘年傳正令汾陽祖席又重新人天共仰法王座唯聽師宣最上乘師云東風昨夜遙稽首西河今日上臺山進云世尊拈花迦葉微笑意旨如何師云剎竿頭上仰蓮心進云秪如未拈花微笑時還有者個消息也無師云月落三更穿市過乃云千年舊鋪又重開上祖家風正令揮不肖兒孫重著楔西河獅子吼如雷直得須彌岌峇海水沸騰奔馳龍象野干心驚驀豎拄杖云大衆還見麼昭祖在山僧拄杖頭上口喃喃地道汾陽有三決衲僧難辨別更擬問如何拄杖驀頭楔遂擲下杖云還家盡是兒孫輩祖父從來不出門復舉僧問祖云如何是接初機句祖曰汝是行腳僧如何是辨衲僧句祖曰西方日出卯如何是正令行底句祖曰千里特來呈舊面如何是定乾坤底句祖曰北俱盧洲長粳米食者無嗔亦無喜又曰將此四轉語驗天下衲僧才見汝出來驗得了也師云昭祖恁麼勘驗大似空中揣骨龜臂刮毛用盡自己心笑破他人口山僧如此批判個中還有傍不肯者麼良久云分明記取一任舉似諸方下座結制上堂一僧出舉起坐具云個中關捩子分明舉似師師云只恐不是玉進云泥牛鬥入海幾個是知音師云易開終始口難保歲寒心僧喝師便打乃云今朝十月十五諸方舊例皆普處處結制開爐直下烹佛煆祖龍象意氣奔騰衲僧足蹈手舞且道為甚如斯卓拄杖云一回煆煉一回新徹體風光耀今古良久云照顧面門芙蓉老和尚令隱素徹空二禪人送法衣至上堂問西來大意即且置祖祖相傳事如何師云千江有水千江月進云燈燈續焰輝三界祖祖相傳印大千師云萬里無雲萬里天進云恁麼一派曹源千古秀汾陽祖道又重新師云正要闍黎共讚揚進云昔日大庾嶺頭提不起汾陽今日又如何師云自從踏斷曹溪路物物拈來總是珍僧問如何是金剛不壞身師云山青水緑進云凡所有相皆是虛妄且道法衣向何處著師云切忌鑽龜打瓦乃云剎竿倒卻全分付少室峰前沒覆藏夜半黃梅無忌諱大庾嶺上絶商量絶商量遍界明明萬古揚今朝落在汾陽手大千包裹更郎當管取佛祖不能出頭凡聖那容走作既然如是且道遞代相傳一句又作麼生高提祖印輝三界利物應機大地彰卓拄杖下座解制世亮劉文學請上堂問把斷要津不通凡聖居士雪裏營齋路頭從何得入師云看腳下進云恁麼處處緑楊堪繫馬家家有路透長安師云箭穿紅日影乃云結制解制諸方舊例九旬把住牢關勘驗聖凡禁忌不容走作絲毫煆煉衲僧巴鼻勦絶異想偷心直須腳跟點地不期大心居士入山勸請第一義諦且喜人人鼻孔撩天各各風雲意氣雖然鼻孔索頭仍落在山僧手裏放行也由山僧把住也由山僧正恁麼時把住為人好放行為人好拈拄杖卓一卓云一朝權在手看取令行時上堂舉不門云十五日以前諸佛生你不得離我者裏若離我者裏我有鉤子鉤你十五日以後諸佛滅你不得住我者裏你若住我者裏我有錐子錐你正當十五日用錐即是用鉤即是師云古人恁麼道大似壓良為賤汾陽者裏卻又不然十五日以前諸佛也不生一任你鉢囊高挂坐斷無為我且無錐錐你十五日以後諸佛亦不滅一任你拄杖橫肩乾坤獨步我且無鉤鉤你正當十五日前後際斷各各痛與三十棒何故不見道重賞之下必有勇夫驀拈拄杖卓一卓下座上堂僧出衆禮拜捲席歸位師云大衆分明記取三十年後自有明眼人證據在便下座上堂驀拈拂子打相云大衆會麼龍華教主向山僧拂子頭上轉大法輪去也於斯會得更説甚麼當來三會授記即能變大地作黃金攪長河為酥酪所謂十世古今始終不離于當念微塵剎海自他不隔於毫端然雖如是於衲僧分上猶未夢見在且道衲僧分上又作麼生喝一喝下座住靈巖禪寺語録結制上堂問閃電光中捉白兔誰是得者師云得進云看箭師云中也僧無語師云拖者死尸出去僧喝師便打問如何是佛師云眼橫鼻直進云如何是彌勒道場師云蟭螟眼裏乾坤大乃云還丹一粒點鐵成金至理一言轉凡成聖今日雲巖寺裏結制將天地為爐須彌作炭拈拄杖云只將這個為鉗鎚直教盡十方世界都盧赤骨律地去且問諸禪德於中作麼生轉身吐氣遂便卓拄杖云絶後再蘇欺君不得復卓一卓下座上堂驀拈拄杖顧視左右云是法住法位世間相常住豎起拄杖云者個是拄杖子阿那個是法復卓一卓云這個是法阿那個是拄杖子諸人試定當看良久云知音不必重重舉達者家風格外新結制上堂乃云韶光散彩萬象騰輝事理雙彰聖凡一致弘開爐韝陶鑄差珍異寶運大鉗鎚煆煉鐵骨英材一為無量無量為一大中現小小中現大若有個漆桶腳下五色線斷直向毗盧頂上橫行釋迦眼裏直踏高超物表獨步大方此未是了事凡夫且不涉功勳一句作麼生道三尺龍泉光照膽萬人叢裏奪高標龍華會薦悼上堂云霜天杲日麗長空大地山河一色同物物毗盧華藏界塵塵彌勒舊家風人天交接真如境凡聖圓融般若宗拈起吹毛揮宇宙十方世界現全容驀拈拄杖打相云諸善知識向者裏領會得去自然光光互照剎剎圓融男子身中入正定女子身中從定起女子身中入正定男子身中從定起西方入定東方起東方入定西方起中入邊起邊入中起拈須彌入芥子將芥子入須彌法法如是非假強為良久云歸堂喫茶去祈睛上堂驀拈拄杖云拄杖子吞卻山河大地娑竭老龍王不覺不知冷地起來打箇噴嚏直得風以時雨以時枯稿皆潤萬物滋茂卓一卓云拄杖子還攝神力依舊青天白日正恁麼時民豐物阜一句作麼生道龍歸大海波濤靜鳳到蒼梧氣象間上堂僧問忙中間不徹間處極有餘去此二途如何趣向師云腳下薦取僧喝師便打乃云達磨不來東土佛法本自現成二祖不往西天聖凡了無彼此一法若有毗盧墮在凡夫萬法若無普賢失其境界直下坐斷兩頭管教高超物外苟或鈍滯二邊未免韓盧逐塊且道必定意作麼生下坡不走快便難逢
