front:
  text: 憨豫禪師語録序白日青天響霹靂聾瞽耳目何歸懸巖窈壑走山魈樵蘇逢迎自慣汾河踞坐既難別昔獅今獅眉睫放光竟覷破西土東土問花香風送滿堂鼻孔誰蠢誰靈看舊鋪新開托鉢兒孫幾肖幾逆樓臺聳翠殿閣祥煙果然人天滿目大地黃金長河酥酪允矣手拂轉輪按莫耶斬癡頑趙州草鞋奚用借爐炭煉凡聖雲門木棒枉勞鐵鷂飛空水牯出袋渾身手眼似虎如龍望千萬峰橫擔不去案山歡悅露柱懷胎雖終日喧譁籠燈照塔將二六時錯過難逢南北東西腳跟下七通八達秋冬春夏身經處一瞬千朝達磨不來二祖不往唱前三後三祇同稱月道餅法眼若抹瞎驢若掀到朝打暮打會駴癩狗泥豬雪梅消息共寒參那管蝦跳龜走爆竹歲時隨世諦豈詢電捲雲騰惟憨豫和尚卓錫汾陽鍵椎獅窟唱提直切揭日月燈於中天印證洞玄醒過見來於俄晷共仰法筵龍象遠奔魔徑犴狐同志録厥宣揚末簡附諸頌古撲爰嘉結制有益宗風檃括來編用副索辨哂鳧鶴之斷續類瑟竽之異同云爾時順治己亥仲秋望日太子太保兵部尚書武英殿大學士西蜀胡世安謹題憨豫禪師語録序佛法不離權實後世故分教宗世尊談經三百餘會說法四十九年其言具在無不可曉即舉拳示珠拈花微笑教外垂機匪為常也嗣是祖祖相承比鋸投針提持向上少室西來指心是佛壇經闡道平實示人皆為和盤托出五宗未列示乃弘多揚眉拍口封紙張弓種種神用覿面舉揚仍後雷喝迭震驚回四衆耳聾雨棒橫施謾誇三禪電掃此關彼注匹馬單鎗問白答黃埋兵掉鬥或號通宗而沙盆扶起或稱正眼而古鏡當臺公案如林徹透七通八達語録若海豁開四滿三平直指言中有響單傳句裏藏鋒雖然如是各闡宗風爭唱祖曲慣翻筋斗何妨遇景呈機解弄猢猻一任逢場作戲但行衲僧本分事須擬龍象互施為憨豫大師得法于龍淵飛錫于汾土三玄重震四喝弘恢廣衍圓音無不明契審根發藥提撕總是機緣倒把橫拈咀嚼俱乃大意誠然象外機先可謂眼筋舌骨有客難余曰文殊意墮于維摩言不如默曹溪辨窮于玄覺意豈無生子何故敲空作響掉豐干之舌為余曰不然師乃說而無說余亦將機就機者也順治庚子歲寎月汾陽羼菴居士朱之俊題于西山之開笑軒憨豫暹禪師語録目録序卷之一住平陽府古堯霍山廣勝禪寺語録住汾陽獅子禪院語録住汾陽太子禪院語録住汾陽靈巖禪寺語録卷之二住平陽府臨汾縣乾明禪寺住平陽府大悲山普濟禪院語録卷之三小參示衆晚參開示卷之四機緣拈頌卷之五聯芳偈像讚詩偈卷之六行實佛事雜著目録終
